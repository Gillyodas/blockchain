services:
    besu-node:
      image: hyperledger/besu:latest
      container_name: chaindegree-besu
      ports:
        - "8545:8545"   # HTTP JSON-RPC (app .NET gọi vào đây)
        - "8546:8546"   # WebSocket
      volumes:
        - ./besu/config/genesis.json:/config/genesis.json
        - besu-data:/opt/besu/data
      command:
        - --genesis-file=/config/genesis.json
        - --rpc-http-enabled
        - --rpc-http-api=ETH,NET,IBFT,WEB3,ADMIN,TXPOOL
        - --rpc-http-host=0.0.0.0
        - --rpc-http-cors-origins=*
        - --rpc-ws-enabled
        - --rpc-ws-host=0.0.0.0
        - --host-allowlist=*
        - --min-gas-price=0

    qdrant:
      image: qdrant/qdrant:latest
      container_name: chaindegree-qdrant
      ports:
        - "6333:6333" # Access REST API
        - "6334:6334" # Access gRPC
      volumes:
        - ./qdrant_storage:/qdrant/storage
      restart: unless-stopped
      environment:
        - QDRANT__SERVICE__GRPC_PORT=6334

    ollama:
      image: ollama/ollama:latest
      container_name: chaindegree-ollama
      ports:
        - "11434:11434"
      volumes:
        - ollama_models:/root/.ollama


volumes:
  besu-data:
  ollama_models: